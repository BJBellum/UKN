<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue Militaire · Forces Armées du Nil</title>
<link rel="icon" type="image/png" href="../../assets/images/UKNSite.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/dune.css">
<style>
*{box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

/* ── NAV ── */
.cat-nav{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(8,5,0,.97);border-bottom:1px solid rgba(232,92,13,.25);
}
[data-theme="light"] .cat-nav{background:rgba(222,198,152,.97);}

/* ── SHELL ── */
.cat-shell{position:fixed;top:54px;left:0;right:0;bottom:0;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
.cat-sidebar{
  width:220px;flex-shrink:0;
  background:#090601;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
[data-theme="light"] .cat-sidebar{background:#C4A468;}
.sb-top{flex-shrink:0;}
.sb-hdr{padding:12px 16px 8px;border-bottom:1px solid var(--border);}
.sb-hdr-name{font-family:'Dune Rise',serif;font-size:9px;letter-spacing:.2em;color:var(--spice);}
.sb-hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.1em;margin-top:2px;}
.sb-total{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.06em;padding:5px 16px;border-bottom:1px solid var(--border);}
.sb-srch-wrap{padding:6px 10px;border-bottom:1px solid var(--border);}
.sb-srch{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;border-radius:2px;outline:none;}
.sb-srch:focus{border-color:var(--spice);}
.sb-scroll{flex:1;overflow-y:auto;}

.sb-group{border-bottom:1px solid var(--border);}
.sb-grp-hdr{
  display:flex;align-items:center;gap:7px;padding:9px 12px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);
  letter-spacing:.05em;cursor:pointer;user-select:none;transition:background .15s;
}
.sb-grp-hdr:hover{background:rgba(232,92,13,.06);}
.sb-arr{color:var(--text3);transition:transform .22s;flex-shrink:0;line-height:1;display:flex;align-items:center;}
.sb-arr.open{transform:rotate(90deg);}
.sb-grp-ico{flex-shrink:0;display:flex;align-items:center;color:var(--spice);opacity:.75;}
.sb-grp-lbl{flex:1;line-height:1.3;}
.sb-grp-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-children{background:rgba(0,0,0,.14);}
[data-theme="light"] .sb-children{background:rgba(0,0,0,.05);}
.sb-sub{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px 6px 28px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);
  letter-spacing:.05em;cursor:pointer;user-select:none;
  transition:all .15s;border-left:2px solid transparent;
}
.sb-sub:hover{background:rgba(232,92,13,.07);color:var(--text2);}
.sb-sub.active{background:rgba(232,92,13,.12);color:var(--spice);border-left-color:var(--spice);}
.sb-sub-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-sub.active .sb-sub-cnt{color:var(--spice);border-color:rgba(232,92,13,.35);}

/* ── MAIN ── */
.cat-main{flex:1;overflow-y:auto;background:var(--bg);}
.cat-content{padding:20px 24px 60px;}
.cat-items-grid{display:flex;flex-direction:column;gap:16px;}
@media(max-width:760px){.cat-sidebar{display:none;}.cat-content{padding:12px;}}

/* Section header */
.cat-sec-hdr{margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.cat-sec-title{font-family:'Dune Rise',serif;font-size:clamp(12px,1.5vw,16px);color:var(--spice);letter-spacing:.1em;}
.cat-sec-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;margin-left:12px;}
.cat-section{margin-bottom:48px;}
.cat-sec-anchor{scroll-margin-top:6px;}

/* ── ITEM CARD — full layout inline ── */
.cat-item{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-right:3px solid rgba(232,92,13,.6);
  display:flex;flex-direction:row;
  overflow:hidden;
  transition:border-right-color .18s,box-shadow .18s;
}
.cat-item:hover{border-right-color:var(--spice);box-shadow:0 3px 16px rgba(232,92,13,.08);}

/* Left: info */
.item-right{flex:1;display:flex;flex-direction:column;min-width:0;order:1;}

/* Right: square image */
.item-img-side{
  flex-shrink:0;
  width:40%;
  aspect-ratio:2/1;
  overflow:hidden;background:var(--bg2);
  border-left:1px solid var(--border);
  order:2;
  display:flex;align-items:center;justify-content:center;
}
.item-img-side img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .35s ease,filter .35s ease;}
.cat-item:hover .item-img-side img{transform:scale(1.04);filter:brightness(1.08);}
.item-img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.item-img-ph-ico{opacity:.18;display:flex;}
.item-img-ph-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:.1em;text-align:center;padding:0 8px;}

/* Head bar */
.item-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.item-head-name{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:rgba(255,255,255,.94);letter-spacing:.03em;}
[data-theme="light"] .item-head-name{color:rgba(0,0,0,.86);}
.item-head-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.item-niv{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 8px;border-radius:2px;border:1px solid;display:inline-block;font-weight:500;}
.item-fab{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.62);}
[data-theme="light"] .item-fab{color:rgba(0,0,0,.56);}
.item-dispo{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--teal-bright);}

/* 3 key badges */
.item-keys{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.item-key{padding:8px 12px;text-align:center;border-right:1px solid var(--border);}
.item-key:last-child{border-right:none;}
.ik-lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(255,255,255,.42);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
[data-theme="light"] .ik-lbl{color:rgba(0,0,0,.40);}
.ik-val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,.90);letter-spacing:.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
[data-theme="light"] .ik-val{color:rgba(0,0,0,.84);}
.ik-val.spice{color:#FF6B35;font-weight:500;}
[data-theme="light"] .ik-val.spice{color:#C84000;}
.ik-val.gold{color:var(--gold);font-family:'Dune Rise',serif;font-size:12px;}
.ik-val.bold{font-weight:600;}

/* Specs */
.item-specs-hdr{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--spice);text-transform:uppercase;padding:8px 14px 6px;border-bottom:1px solid rgba(232,92,13,.18);background:rgba(232,92,13,.04);}
.item-specs-grid{display:grid;grid-template-columns:1fr 1fr;flex:1;}
@media(max-width:480px){.item-specs-grid{grid-template-columns:1fr;}}
.isg-item{padding:6px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.isg-item:nth-child(even){border-right:none;}
@media(max-width:480px){.isg-item{border-right:none;}}
.isg-key{font-family:'IBM Plex Mono',monospace;font-size:9px;color:rgba(255,255,255,.62);letter-spacing:.05em;margin-bottom:2px;}
[data-theme="light"] .isg-key{color:rgba(0,0,0,.56);}
.isg-val{font-family:'IBM Plex Mono',monospace;font-size:14px;color:rgba(255,255,255,.88);letter-spacing:.02em;}
[data-theme="light"] .isg-val{color:rgba(0,0,0,.82);}
.item-specs-empty{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);padding:12px 14px;}

/* Mobile */
@media(max-width:600px){
  .cat-item{flex-direction:column;}
  .item-img-side{width:100%;aspect-ratio:2/1;max-width:100%;border-left:none;border-top:1px solid var(--border);order:0;}
}

/* NIV colors */
.niv-1,.niv-2{color:#9B8060;border-color:rgba(155,128,96,.35);}
.niv-3,.niv-4{color:#C87830;border-color:rgba(200,120,48,.35);}
.niv-5,.niv-6{color:#D4A843;border-color:rgba(212,168,67,.35);}
.niv-7,.niv-8{color:#22B89A;border-color:rgba(34,184,154,.35);}
.niv-9,.niv-10{color:#4A9EFF;border-color:rgba(74,158,255,.35);}
.niv-11,.niv-12{color:#E85C0D;border-color:rgba(232,92,13,.35);}

/* Empty */
.cat-empty{text-align:center;padding:72px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.1em;line-height:2;}
.cat-empty-ico{margin-bottom:16px;opacity:.18;display:flex;justify-content:center;}
</style>

<body>

<nav class="cat-nav">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-family:'Dune Rise',serif;font-size:10px;letter-spacing:.18em;color:var(--spice);">Catalogue Militaire</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.1em;border:1px solid rgba(232,92,13,.2);padding:2px 7px;border-radius:2px;">CAT-MIL-001</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="../" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:5px 10px;border-radius:2px;">&#8592; Catalogues</a>
    <button onclick="toggleTheme()" style="background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;"><span id="tlbl">NUIT</span></button>
  </div>
</nav>

<div class="cat-shell">
  <aside class="cat-sidebar">
    <div class="sb-top">
      <div class="sb-hdr">
        <div class="sb-hdr-name">Categories</div>
        <div class="sb-hdr-sub">Forces Armees du Nil · 2305</div>
      </div>
      <div class="sb-total" id="sb-total">— equipements</div>
      <div class="sb-srch-wrap">
        <input type="text" class="sb-srch" id="cat-search" placeholder="Rechercher…" oninput="onSearch()">
      </div>
    </div>
    <div class="sb-scroll" id="sb-list"></div>
  </aside>

  <main class="cat-main" id="cat-main">
    <div class="cat-content" id="cat-content">
      <div class="cat-empty">
        <div class="cat-empty-ico">
          <svg viewBox="0 0 48 48" fill="none" width="48" height="48">
            <path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/>
            <path d="M18 24h12M24 18v12" stroke="#4A3C28" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        Selectionnez une categorie dans la barre laterale.
      </div>
    </div>
  </main>
</div>

<script>
var ICONS={
  terrestre:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M8 2L2 5v4c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V5L8 2Z" stroke="currentColor" stroke-width="1.1" fill="none"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><line x1="8" y1="5" x2="8" y2="11" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>',
  aerien:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M9 3c0 0 2 1 2 3L14 8l-3 1-2-2H7L5 9H3L2 8l3-2c0-2 1-3 1-3H9Z" stroke="currentColor" stroke-width="1" fill="none" stroke-linejoin="round"/><path d="M7 11l1 2h1l1-2" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  naval:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M3 10L8 4l5 6H3Z" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linejoin="round"/><line x1="8" y1="4" x2="8" y2="2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M2 12c1.5 1.5 10 1.5 12 0" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/></svg>',
  missiles:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M10 2L14 6l-8 8-4-1-1-4 9-8Z" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linejoin="round"/><path d="M7 9l2-2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M2 14l3-1" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity=".5"/></svg>'
};

var GROUPS=[
  {id:'terrestre',label:'Terrestre',icon:'terrestre',sub:[
    {id:'armes-feu',            label:'Armes a Feu'},
    {id:'explosifs',            label:'Explosifs & Grenades'},
    {id:'vehicules-terrestres', label:'Vehicules Terrestres'},
    {id:'artillerie',           label:'Artillerie Placee'}
  ]},
  {id:'aerien',label:'Aerien',icon:'aerien',sub:[
    {id:'aeronefs',label:'Vehicules Aeriens Militaires'}
  ]},
  {id:'naval',label:'Naval',icon:'naval',sub:[
    {id:'navires',    label:'Navires de Surface'},
    {id:'sous-marins',label:'Sous-marins'}
  ]},
  {id:'balistique',label:'Balistique & Spatial',icon:'missiles',sub:[
    {id:'missiles',             label:'Missiles & Roquettes'},
    {id:'missiles-strategiques',label:'Missiles Strategiques'}
  ]}
];

var TECH={1:'1910-1919',2:'1920-1929',3:'1930-1939',4:'1940-1949',5:'1950-1959',6:'1960-1969',7:'1970-1979',8:'1980-1989',9:'1990-1999',10:'2000-2009',11:'2010-2019',12:'2020+'};

var catalogue=[];
var openG={terrestre:true,aerien:true,naval:true,balistique:true};
var activeCat='';
var searchQ='';

function loadLocal(){
  try{
    var s=localStorage.getItem('cat_militaire');
    catalogue=s?JSON.parse(s):[];
    // Strip any cached image_data (use image_path + remote URL instead)
    catalogue.forEach(function(item){delete item.image_data;});
  }catch(e){catalogue=[];}
}
function syncGH(){
  fetch('https://api.github.com/repos/BJBellum/UKN/contents/data/catalogue-militaire.json',{
    headers:{'Accept':'application/vnd.github.v3.raw'},cache:'no-store'
  }).then(function(r){return r.ok?r.json():null;})
  .then(function(d){
    if(!d||!Array.isArray(d))return;
    d.forEach(function(remote){
      var loc=catalogue.find(function(x){return x.id===remote.id;});
      if(loc&&loc.image_data&&!remote.image_data)remote.image_data=loc.image_data;
    });
    catalogue=d;
    // Strip image_data before caching (fetch from image_path instead)
    var toCache=catalogue.map(function(item){
      var copy=Object.assign({},item);
      delete copy.image_data;
      return copy;
    });
    localStorage.setItem('cat_militaire',JSON.stringify(toCache));
    renderSidebar();renderContent();
  }).catch(function(){});
}

/* ── SIDEBAR ── */
function renderSidebar(){
  var tot=catalogue.length;
  var el=document.getElementById('sb-total');
  if(el)el.textContent=tot+' equipement'+(tot!==1?'s':'');
  var list=document.getElementById('sb-list');if(!list)return;
  var html='';
  GROUPS.forEach(function(g){
    var gTot=catalogue.filter(function(i){return g.sub.some(function(s){return s.id===i.categorie;});}).length;
    var isOpen=!!openG[g.id];
    html+='<div class="sb-group">';
    html+='<div class="sb-grp-hdr" onclick="toggleG(\''+g.id+'\')">';
    html+='<span class="sb-arr'+(isOpen?' open':'')+'"><svg viewBox="0 0 8 12" fill="none" width="8" height="12"><path d="M2 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    html+='<span class="sb-grp-ico">'+ICONS[g.icon]+'</span>';
    html+='<span class="sb-grp-lbl">'+g.label+'</span>';
    html+='<span class="sb-grp-cnt">'+gTot+'</span>';
    html+='</div>';
    if(isOpen){
      html+='<div class="sb-children">';
      g.sub.forEach(function(sub){
        var cnt=catalogue.filter(function(i){return i.categorie===sub.id;}).length;
        var isAct=sub.id===activeCat;
        html+='<div class="sb-sub'+(isAct?' active':'')+'\" onclick="selectCat(\''+sub.id+'\')">';
        html+='<span>'+sub.label+'</span><span class="sb-sub-cnt">'+cnt+'</span>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  list.innerHTML=html;
}
function toggleG(id){openG[id]=!openG[id];renderSidebar();}
function selectCat(id){
  activeCat=id;searchQ='';
  var si=document.getElementById('cat-search');if(si)si.value='';
  renderSidebar();renderContent();
  setTimeout(function(){
    var anchor=document.getElementById('sec-'+id);
    if(anchor){var m=document.getElementById('cat-main');if(m)m.scrollTo({top:anchor.offsetTop-6,behavior:'smooth'});}
  },60);
}
function onSearch(){
  searchQ=(document.getElementById('cat-search').value||'').toLowerCase();
  if(searchQ)activeCat='';
  renderSidebar();renderContent();
}

/* ── ITEM CARD builder ── */
function buildItemHTML(item){
  var niv=item.niveau||1;
  var nivLbl='NIV '+niv+' \u00b7 '+(TECH[niv]||'');
  var imgSrc=item.image_data||(item.image_path?'https://bjbellum.github.io/UKN/'+item.image_path:'');
  var specs=item.specs||{};
  var specKeys=Object.keys(specs).filter(function(k){return specs[k];});
  var coutFmt=item.cout_unite?Number(item.cout_unite).toLocaleString('fr')+' N\u00a3':'\u2014';
  var dispo=item.disponibilite||'';

  var html='<div class="cat-item" id="item-'+item.id+'">';

  // LEFT: text info (order:1)
  html+='<div class="item-right">';

  // Head bar: name + NIV + fabricant + dispo
  html+='<div class="item-head">';
  html+='<div class="item-head-name">'+(item.nom||'\u2014')+'</div>';
  html+='<div class="item-head-meta">';
  if(item.fabricant)html+='<span class="item-fab">'+item.fabricant+'</span>';
  html+='<span class="item-niv niv-'+niv+'">'+nivLbl+'</span>';
  if(dispo)html+='<span class="item-dispo">'+dispo+'</span>';
  html+='</div></div>';

  // 3 badges
  html+='<div class="item-keys">';
  html+='<div class="item-key"><div class="ik-lbl">Inspiration</div><div class="ik-val spice" title="'+(item.inspiration||'\u2014')+'">'+(item.inspiration||'\u2014')+'</div></div>';
  html+='<div class="item-key"><div class="ik-lbl">Cout unitaire</div><div class="ik-val gold">'+coutFmt+'</div></div>';

  html+='</div>';

  // Specs
  if(specKeys.length){
    html+='<div class="item-specs-hdr">Caracteristiques techniques</div>';
    html+='<div class="item-specs-grid">';
    specKeys.forEach(function(k){
      html+='<div class="isg-item"><div class="isg-key">'+k+'</div><div class="isg-val">'+specs[k]+'</div></div>';
    });
    if(specKeys.length%2===1)html+='<div class="isg-item"></div>';
    html+='</div>';
  } else {
    html+='<div class="item-specs-empty">Aucune specification renseignee.</div>';
  }
  html+='</div>'; // /item-right

  // RIGHT: image (order:2), square
  html+='<div class="item-img-side">';
  if(imgSrc){
    html+='<img src="'+imgSrc+'" alt="'+(item.nom||'')+'" loading="lazy">';
  } else {
    html+='<div class="item-img-ph"><div class="item-img-ph-ico"><svg viewBox="0 0 48 48" fill="none" width="36" height="36"><rect x="3" y="3" width="42" height="42" rx="2" stroke="#3A2E1E" stroke-width="1" fill="none"/><circle cx="15" cy="15" r="5" stroke="#3A2E1E" stroke-width="1" fill="none"/><path d="M3 32l12-10 10 8 8-6 15 13" stroke="#3A2E1E" stroke-width="1" fill="none"/></svg></div><span class="item-img-ph-lbl">500\u00d7500</span></div>';
  }
  html+='</div>'; // /item-img-side

  html+='</div>'; // /cat-item
  return html;
}

/* ── CONTENT ── */
function renderContent(){
  var el=document.getElementById('cat-content');if(!el)return;
  var allSub=[];GROUPS.forEach(function(g){g.sub.forEach(function(s){allSub.push(s);});});

  // Search
  if(searchQ){
    var items=catalogue.filter(function(i){
      return (i.nom||'').toLowerCase().indexOf(searchQ)>=0||
             (i.fabricant||'').toLowerCase().indexOf(searchQ)>=0||
             (i.inspiration||'').toLowerCase().indexOf(searchQ)>=0;
    });
    if(!items.length){el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>Aucun resultat pour "'+searchQ+'".</div>';return;}
    var html='<div class="cat-sec-hdr"><span class="cat-sec-title">RESULTATS DE RECHERCHE</span><span class="cat-sec-count">'+items.length+' resultat'+(items.length!==1?'s':'')+'</span></div>';
    html+='<div class="cat-items-grid">';
    items.forEach(function(i){html+=buildItemHTML(i);});
    html+='</div>';
    el.innerHTML=html;return;
  }

  // Single category
  if(activeCat){
    var items=catalogue.filter(function(i){return i.categorie===activeCat;});
    var catInfo=allSub.find(function(s){return s.id===activeCat;})||{label:activeCat};
    if(!items.length){el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>Aucun equipement dans cette categorie.</div>';return;}
    var html='<div id="sec-'+activeCat+'" class="cat-section cat-sec-anchor"><div class="cat-sec-hdr"><span class="cat-sec-title">'+catInfo.label.toUpperCase()+'</span><span class="cat-sec-count">'+items.length+' equipement'+(items.length!==1?'s':'')+' · FAN · 2305</span></div>';
    html+='<div class="cat-items-grid">';
    items.forEach(function(i){html+=buildItemHTML(i);});
    html+='</div></div>';
    el.innerHTML=html;return;
  }

  // All sections
  var html='';var total=0;
  GROUPS.forEach(function(g){
    g.sub.forEach(function(sub){
      var items=catalogue.filter(function(i){return i.categorie===sub.id;});
      if(!items.length)return;
      total+=items.length;
      html+='<div id="sec-'+sub.id+'" class="cat-section cat-sec-anchor">';
      html+='<div class="cat-sec-hdr"><span class="cat-sec-title">'+sub.label.toUpperCase()+'</span><span class="cat-sec-count">'+items.length+' equipement'+(items.length!==1?'s':'')+'</span></div>';
      html+='<div class="cat-items-grid">';
      items.forEach(function(i){html+=buildItemHTML(i);});
      html+='</div></div>';
    });
  });
  if(!total){el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>Selectionnez une categorie dans la barre laterale.</div>';return;}
  el.innerHTML=html;
}

/* ── THEME ── */
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);var lbl=document.getElementById('tlbl');if(lbl)lbl.textContent=t==='dark'?'NUIT':'JOUR';localStorage.setItem('run-theme',t);}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
(function(){var s=localStorage.getItem('run-theme'),mq=window.matchMedia('(prefers-color-scheme: dark)');applyTheme(s||(mq.matches?'dark':'light'));})();

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',function(){
  loadLocal();renderSidebar();renderContent();syncGH();
});
</script>
<script src="../../pharos-auth.js"></script>
