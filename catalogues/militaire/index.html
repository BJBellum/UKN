<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue Militaire · Forces Armées du Nil</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

/* ── NAV ── */
.cat-nav{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(8,5,0,.97);border-bottom:1px solid rgba(232,92,13,.25);
}
[data-theme="light"] .cat-nav{background:rgba(222,198,152,.97);}

/* ── SHELL ── */
.cat-shell{position:fixed;top:54px;left:0;right:0;bottom:0;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
.cat-sidebar{
  width:220px;flex-shrink:0;
  background:#090601;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
[data-theme="light"] .cat-sidebar{background:#C4A468;}
.sb-top{flex-shrink:0;}
.sb-hdr{padding:12px 16px 8px;border-bottom:1px solid var(--border);}
.sb-hdr-name{font-family:'Dune Rise',serif;font-size:9px;letter-spacing:.2em;color:var(--spice);}
.sb-hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.1em;margin-top:2px;}
.sb-total{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.06em;padding:5px 16px;border-bottom:1px solid var(--border);}
.sb-srch-wrap{padding:6px 10px;border-bottom:1px solid var(--border);}
.sb-srch{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;border-radius:2px;outline:none;}
.sb-all-tech-btn{width:100%;background:rgba(232,92,13,.07);border:1px solid rgba(232,92,13,.25);color:var(--spice);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;padding:6px 10px;cursor:pointer;border-radius:2px;transition:background .15s,border-color .15s;text-align:left;display:flex;align-items:center;gap:6px;}
.sb-all-tech-btn:hover{background:rgba(232,92,13,.14);border-color:rgba(232,92,13,.4);}
.sb-all-tech-btn.active{background:rgba(232,92,13,.18);border-color:var(--spice);font-weight:600;}
.sb-srch:focus{border-color:var(--spice);}
.sb-scroll{flex:1;overflow-y:auto;}

.sb-group{border-bottom:1px solid var(--border);}
.sb-grp-hdr{
  display:flex;align-items:center;gap:7px;padding:9px 12px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);
  letter-spacing:.05em;cursor:pointer;user-select:none;transition:background .15s;
}
.sb-grp-hdr:hover{background:rgba(232,92,13,.06);}
.sb-arr{color:var(--text3);transition:transform .22s;flex-shrink:0;line-height:1;display:flex;align-items:center;}
.sb-arr.open{transform:rotate(90deg);}
.sb-grp-ico{flex-shrink:0;display:flex;align-items:center;color:var(--spice);opacity:.75;}
.sb-grp-lbl{flex:1;line-height:1.3;}
.sb-grp-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-children{background:rgba(0,0,0,.14);}
[data-theme="light"] .sb-children{background:rgba(0,0,0,.05);}
.sb-sub{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px 6px 28px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);
  letter-spacing:.05em;cursor:pointer;user-select:none;
  transition:all .15s;border-left:2px solid transparent;
}
.sb-sub:hover{background:rgba(232,92,13,.07);color:var(--text2);}
.sb-sub.active{background:rgba(232,92,13,.12);color:var(--spice);border-left-color:var(--spice);}
.sb-sub-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-sub.active .sb-sub-cnt{color:var(--spice);border-color:rgba(232,92,13,.35);}

/* ── MAIN ── */
.cat-main{flex:1;overflow-y:auto;background:var(--bg);}
.cat-content{padding:14px 20px 50px;}
.cat-items-grid{display:flex;flex-direction:column;gap:10px;}
@media(max-width:760px){.cat-sidebar{display:none;}.cat-content{padding:12px;}}

/* Section header */
.cat-sec-hdr{margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cat-sec-title{font-family:'Dune Rise',serif;font-size:clamp(12px,1.5vw,16px);color:var(--spice);letter-spacing:.1em;}
.cat-sec-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;margin-left:12px;}
.cat-section{margin-bottom:28px;}
.cat-sec-anchor{scroll-margin-top:6px;}

/* ── ITEM CARD — side-by-side layout ── */
.cat-item{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-top:2px solid rgba(232,92,13,.5);
  overflow:hidden;
  transition:border-top-color .18s,box-shadow .18s;
}
.cat-item:hover{border-top-color:var(--spice);}

/* ── SIDE-BY-SIDE LAYOUT ── */
.item-layout{
  display:flex;
  flex-direction:row;
  min-height:0;
}

/* ── LEFT: image 2:1 ratio (half width) ── */
.item-img-side{
  width:50%;
  flex-shrink:0;
  aspect-ratio:2/1;
  align-self:flex-start;
  overflow:hidden;
  background:var(--bg2);
  position:relative;
  border-right:1px solid var(--border);
}
.item-img-side img{width:100%;height:100%;object-fit:cover;display:block;}
.item-img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.item-img-ph-ico{opacity:.14;display:flex;}
.item-img-ph-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text2);letter-spacing:.10em;}

/* ── RIGHT: info panel ── */
.item-info-side{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}

/* NOM block */
.item-nom-block{
  padding:10px 14px 8px;
  flex-shrink:0;
}
.item-nom-lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(255,255,255,.38);letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px;}
[data-theme="light"] .item-nom-lbl{color:rgba(0,0,0,.36);}
.item-nom-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:rgba(255,255,255,.97);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
[data-theme="light"] .item-nom-val{color:rgba(0,0,0,.90);}
.item-prix-val{font-family:'Dune Rise',serif;font-size:11px;color:var(--gold);letter-spacing:.04em;margin-top:3px;}
[data-theme="light"] .item-prix-val{color:#8B6500;}

/* Separator */
.item-sep{height:1px;background:rgba(232,92,13,.35);margin:0;flex-shrink:0;}

/* NV + TECH row */
.item-nv-tech{
  padding:6px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  flex-shrink:0;
  flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
.int-niv{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 8px;border-radius:2px;border:1px solid;display:inline-block;font-weight:500;white-space:nowrap;}
.int-tech{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--teal-bright);letter-spacing:.06em;white-space:nowrap;}
.int-fab{font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(255,255,255,.46);white-space:nowrap;}
[data-theme="light"] .int-fab{color:rgba(0,0,0,.42);}

/* ── COLLAPSIBLE SPECS (inside right panel) ── */
.item-specs-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px;cursor:pointer;user-select:none;
  background:rgba(232,92,13,.04);
  transition:background .15s;
  flex-shrink:0;
}
.item-specs-toggle:hover{background:rgba(232,92,13,.08);}
.cat-item.open .item-specs-toggle{border-bottom:1px solid rgba(232,92,13,.18);}
.ist-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.12em;color:var(--spice);text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.ist-tri{font-size:12px;transition:transform .22s;display:inline-block;color:var(--spice);}
.cat-item.open .ist-tri{transform:rotate(90deg);}
.ist-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

.item-specs-body{display:none;border-top:1px solid var(--border);overflow-y:auto;max-height:180px;}
.cat-item.open .item-specs-body{display:block;}
.item-specs-grid{display:grid;grid-template-columns:1fr 1fr;}
.isg-item{padding:4px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.isg-item:nth-child(even){border-right:none;}
.isg-key{font-family:'IBM Plex Mono',monospace;font-size:7px;color:rgba(255,255,255,.50);letter-spacing:.05em;margin-bottom:1px;}
[data-theme="light"] .isg-key{color:rgba(0,0,0,.44);}
.isg-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.90);letter-spacing:.02em;}
[data-theme="light"] .isg-val{color:rgba(0,0,0,.82);}
.item-specs-empty{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);padding:10px 14px;}

/* Mobile: stack vertically */
@media(max-width:640px){
  .item-layout{flex-direction:column;}
  .item-img-side{width:100%;aspect-ratio:2/1;border-right:none;border-bottom:1px solid var(--border);}
}

/* NIV colors */
.niv-1,.niv-2{color:#9B8060;border-color:rgba(155,128,96,.35);}
.niv-3,.niv-4{color:#C87830;border-color:rgba(200,120,48,.35);}
.niv-5,.niv-6{color:#D4A843;border-color:rgba(212,168,67,.35);}
.niv-7,.niv-8{color:#22B89A;border-color:rgba(34,184,154,.35);}
.niv-9,.niv-10{color:#4A9EFF;border-color:rgba(74,158,255,.35);}
.niv-11,.niv-12{color:#E85C0D;border-color:rgba(232,92,13,.35);}

/* Empty */

/* ── CALCULATEUR PANIER ── */
.calc-toggle-btn{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  z-index:300;
  background:rgba(232,92,13,.9);border:1px solid var(--spice);
  border-right:none;border-radius:4px 0 0 4px;
  color:#fff;font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.1em;writing-mode:vertical-rl;
  padding:16px 7px;cursor:pointer;
  transition:background .15s;user-select:none;
  display:flex;align-items:center;gap:6px;
}
.calc-toggle-btn:hover{background:var(--spice);}
.calc-toggle-btn svg{transform:rotate(90deg);}

.calc-panel{
  position:fixed;right:0;top:0;bottom:0;width:340px;
  z-index:400;
  background:rgba(8,5,0,.98);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.calc-panel.open{transform:translateX(0);}
[data-theme="light"] .calc-panel{background:rgba(230,215,185,.98);}

.calc-hdr{
  flex-shrink:0;
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(232,92,13,.07);
}
.calc-hdr-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--spice);text-transform:uppercase;}
.calc-close{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 4px;line-height:1;}
.calc-close:hover{color:var(--spice);}

/* Add item row */
.calc-add-row{
  flex-shrink:0;padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.15);
}
[data-theme="light"] .calc-add-row{background:rgba(0,0,0,.04);}
.calc-add-title{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
.calc-add-fields{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
.calc-field{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 9px;border-radius:2px;outline:none;}
.calc-field:focus{border-color:var(--spice);}
.calc-field-row{display:flex;gap:5px;}
.calc-add-btn{width:100%;background:rgba(232,92,13,.1);border:1px solid rgba(232,92,13,.35);color:var(--spice);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;padding:7px;cursor:pointer;border-radius:2px;transition:all .15s;}
.calc-add-btn:hover{background:rgba(232,92,13,.2);border-color:var(--spice);}

/* Quick-add buttons from catalogue */
.calc-quick-title{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin:8px 0 5px;}
.calc-quick-list{display:flex;flex-wrap:wrap;gap:4px;}
.calc-quick-btn{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:3px 7px;background:var(--card-bg);border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:2px;transition:all .12s;}
.calc-quick-btn:hover{border-color:var(--spice);color:var(--spice);}

/* Cart items */
.calc-cart{flex:1;overflow-y:auto;padding:10px 12px;min-height:80px;}
.calc-cart-empty{text-align:center;padding:32px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;}
.calc-cart-item{
  background:var(--card-bg);border:1px solid var(--border);
  border-left:3px solid var(--spice);
  padding:9px 10px;margin-bottom:6px;
  display:flex;flex-direction:column;gap:4px;
}
.cci-name{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);font-weight:500;letter-spacing:.03em;}
.cci-prix-unit{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);}
.cci-row{display:flex;align-items:center;gap:8px;margin-top:3px;}
.cci-qty{width:72px;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 7px;border-radius:2px;outline:none;text-align:right;}
.cci-qty:focus{border-color:var(--spice);}
.cci-total{flex:1;text-align:right;font-family:'Dune Rise',serif;font-size:13px;color:var(--gold);letter-spacing:.04em;}
.cci-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;}
.cci-del:hover{color:#E84848;}

/* Footer totals */
.calc-footer{
  flex-shrink:0;border-top:2px solid rgba(232,92,13,.3);
  background:rgba(232,92,13,.06);padding:12px 14px;
}
.calc-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.calc-total-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.calc-total-val{font-family:'Dune Rise',serif;font-size:18px;color:var(--gold);letter-spacing:.04em;}
.calc-total-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);}
.calc-reset-btn{width:100%;margin-top:8px;background:transparent;border:1px solid rgba(232,92,13,.25);color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;padding:5px;cursor:pointer;border-radius:2px;transition:all .15s;}
.calc-reset-btn:hover{border-color:var(--spice);color:var(--spice);}

.cat-empty{text-align:center;padding:72px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.1em;line-height:2;}
.cat-empty-ico{margin-bottom:16px;opacity:.18;display:flex;justify-content:center;}
</style>

function loadLocal(){
  try{
    var s=localStorage.getItem('cat_militaire');
    catalogue=s?JSON.parse(s):[];
    // Strip any cached image_data (use image_path + remote URL instead)
    catalogue.forEach(function(item){delete item.image_data;});
  }catch(e){catalogue=[];}
}
function syncGH(){
  fetch('https://api.github.com/repos/BJBellum/UKN/contents/data/catalogue-militaire.json',{
    headers:{'Accept':'application/vnd.github.v3.raw'},cache:'no-store'
  }).then(function(r){return r.ok?r.json():null;})
  .then(function(d){
    if(!d||!Array.isArray(d))return;
    d.forEach(function(remote){
      var loc=catalogue.find(function(x){return x.id===remote.id;});
      if(loc&&loc.image_data&&!remote.image_data)remote.image_data=loc.image_data;
    });
    catalogue=d;
    // Strip image_data before caching (fetch from image_path instead)
    var toCache=catalogue.map(function(item){
      var copy=Object.assign({},item);
      delete copy.image_data;
      return copy;
    });
    localStorage.setItem('cat_militaire',JSON.stringify(toCache));
    renderSidebar();renderContent();if(calcOpen)calcRefreshQuick();
  }).catch(function(){});
}

/* ── SIDEBAR ── */
function toggleItem(id){var el=document.getElementById('item-'+id);if(el)el.classList.toggle('open');}

function renderSidebar(){
  var tot=catalogue.length;
  var el=document.getElementById('sb-total');
  if(el)el.textContent=tot+' equipement'+(tot!==1?'s':'');
  var list=document.getElementById('sb-list');if(!list)return;
  var html='';
  GROUPS.forEach(function(g){
    var gTot=catalogue.filter(function(i){return g.sub.some(function(s){return s.id===i.categorie;});}).length;
    var isOpen=!!openG[g.id];
    html+='<div class="sb-group">';
    html+='<div class="sb-grp-hdr" onclick="toggleG(\''+g.id+'\')">';
    html+='<span class="sb-arr'+(isOpen?' open':'')+'"><svg viewBox="0 0 8 12" fill="none" width="8" height="12"><path d="M2 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    html+='<span class="sb-grp-ico">'+ICONS[g.icon]+'</span>';
    html+='<span class="sb-grp-lbl">'+g.label+'</span>';
    html+='<span class="sb-grp-cnt">'+gTot+'</span>';
    html+='</div>';
    if(isOpen){
      html+='<div class="sb-children">';
      g.sub.forEach(function(sub){
        var cnt=catalogue.filter(function(i){return i.categorie===sub.id;}).length;
        var isAct=sub.id===activeCat;
        html+='<div class="sb-sub'+(isAct?' active':'')+'\" onclick="selectCat(\''+sub.id+'\')">';
        html+='<span>'+sub.label+'</span><span class="sb-sub-cnt">'+cnt+'</span>';

  var html='<div class="cat-item" id="item-'+item.id+'">';

  }
  html+='</div>';

  // ── RIGHT: INFO PANEL ──
  html+='<div class="item-info-side">';

  // NOM + Prix
  html+='<div class="item-nom-block">';
  html+='<div class="item-nom-lbl">Designation</div>';
  html+='<div class="item-nom-val" title="'+(item.nom||'\u2014')+'">'+(item.nom||'\u2014')+'</div>';
  html+='<div class="item-prix-val">'+coutFmt+'</div>';
  html+='</div>';

  // Separator line (orange)
  html+='<div class="item-sep"></div>';

  // NV + TECH row
  html+='<div class="item-nv-tech">';
  html+='<span class="int-niv niv-'+niv+'">'+nivLbl+'</span>';

  if(item.disponibilite)html+='<span class="int-tech">'+item.disponibilite+'</span>';
  html+='</div>';

  // Collapsible specs toggle
  html+='<div class="item-specs-toggle" onclick="toggleItem(\''+item.id+'\')">';
  html+='<div class="ist-label"><span class="ist-tri">&#8250;</span> Caracteristiques <span style="color:var(--text3);font-size:9px;">('+specKeys.length+')</span></div>';
  html+='<div class="ist-meta">';
  html+='<button onclick="event.stopPropagation();calcQuickAdd(\''+item.id+'\');" title="Ajouter au panier" style="background:rgba(232,92,13,.12);border:1px solid rgba(232,92,13,.3);color:var(--spice);font-family:\'IBM Plex Mono\',monospace;font-size:9px;padding:1px 7px;border-radius:2px;cursor:pointer;letter-spacing:.06em;flex-shrink:0;">+ Panier</button>';

/* ── CONTENT ── */
function renderContent(){
  var el=document.getElementById('cat-content');if(!el)return;
  var allSub=[];GROUPS.forEach(function(g){g.sub.forEach(function(s){allSub.push(s);});});

  // Search
  if(searchQ){
    var items=catalogue.filter(function(i){
      return (i.nom||'').toLowerCase().indexOf(searchQ)>=0||
             (i.fabricant||'').toLowerCase().indexOf(searchQ)>=0||
             (i.inspiration||'').toLowerCase().indexOf(searchQ)>=0;
    });
    if(!items.length){el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>Aucun resultat pour "'+searchQ+'".</div>';return;}
    var html='<div class="cat-sec-hdr"><span class="cat-sec-title">RESULTATS DE RECHERCHE</span><span class="cat-sec-count">'+items.length+' resultat'+(items.length!==1?'s':'')+'</span></div>';
    html+='<div class="cat-items-grid">';
    items.forEach(function(i){html+=buildItemHTML(i);});
    html+='</div>';
    el.innerHTML=html;return;
  }

  // Single category
  if(activeCat){
    var items=catalogue.filter(function(i){return i.categorie===activeCat;});
    var catInfo=allSub.find(function(s){return s.id===activeCat;})||{label:activeCat};
    if(!items.length){el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>Aucun equipement dans cette categorie.</div>';return;}
    var html='<div id="sec-'+activeCat+'" class="cat-section cat-sec-anchor"><div class="cat-sec-hdr"><span class="cat-sec-title">'+catInfo.label.toUpperCase()+'</span><span class="cat-sec-count">'+items.length+' equipement'+(items.length!==1?'s':'')+' · FAN · 2305</span></div>';
    html+='<div class="cat-items-grid">';
    items.forEach(function(i){html+=buildItemHTML(i);});
    html+='</div></div>';
    el.innerHTML=html;return;
  }

  // All sections
  var html='';var total=0;
  GROUPS.forEach(function(g){
    g.sub.forEach(function(sub){
      var items=catalogue.filter(function(i){return i.categorie===sub.id;});
      if(!items.length)return;
      total+=items.length;
      html+='<div id="sec-'+sub.id+'" class="cat-section cat-sec-anchor">';
      html+='<div class="cat-sec-hdr"><span class="cat-sec-title">'+sub.label.toUpperCase()+'</span><span class="cat-sec-count">'+items.length+' equipement'+(items.length!==1?'s':'')+'</span></div>';
      html+='<div class="cat-items-grid">';
      items.forEach(function(i){html+=buildItemHTML(i);});
      html+='</div></div>';
    });
  });
  if(!total){el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>Selectionnez une categorie dans la barre laterale.</div>';return;}
  el.innerHTML=html;
}

var calcCart=[]; // [{nom, prixUnit, qty}]
var calcOpen=false;

function calcToggle(){
  calcOpen=!calcOpen;
  var panel=document.getElementById('calc-panel');
  var btn=document.getElementById('calc-toggle-btn');
  if(panel)panel.classList.toggle('open',calcOpen);
  if(btn)btn.style.right=calcOpen?'340px':'0';
  if(calcOpen)calcRefreshQuick();
}

function calcRefreshQuick(){
  var sel=document.getElementById('calc-select-item');
  if(!sel)return;
  var groups={};
  catalogue.forEach(function(item){
    var cat=item.categorie||'Autres';
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(item);
  });
  var html='<option value="">— Choisir dans le catalogue —</option>';
  Object.keys(groups).sort().forEach(function(cat){
    html+='<optgroup label="'+cat+'">';
    groups[cat].forEach(function(item){
      var prix=item.cout_unite?Number(item.cout_unite):0;
      html+='<option value="'+item.id+'">'+(item.nom||'—')+' · '+(prix?prix.toLocaleString('fr')+' N£':'N/A')+'</option>';
    });
    html+='</optgroup>';
  });
  sel.innerHTML=html;
  document.getElementById('calc-item-preview').style.display='none';
}

function calcOnSelectItem(id){
  var prev=document.getElementById('calc-item-preview');
  if(!id){if(prev)prev.style.display='none';return;}
  var item=catalogue.find(function(x){return x.id===id;});
  if(!item){if(prev)prev.style.display='none';return;}
  var prix=item.cout_unite?Number(item.cout_unite):0;
  document.getElementById('calc-preview-nom').textContent=item.nom||'—';
  document.getElementById('calc-preview-prix').textContent=prix?prix.toLocaleString('fr')+' N£ / unité':'Prix non renseigné';
  if(prev)prev.style.display='block';
}

function calcAddFromSelect(){
  var sel=document.getElementById('calc-select-item');
  var id=sel?sel.value:'';
  if(!id){
    // Show feedback
    var btn=document.querySelector('.calc-add-btn');
    if(btn){var orig=btn.textContent;btn.textContent='← Sélectionner un équipement';btn.style.color='#E84848';setTimeout(function(){btn.textContent=orig;btn.style.color='';},1500);}
    return;
  }
  // Refresh select in case catalogue updated
  if(!catalogue.length){alert('Le catalogue est encore en cours de chargement. Attendez quelques secondes.');return;}
  var item=catalogue.find(function(x){return x.id===id;});
  if(!item){calcRefreshQuick();return;}
  var qty=parseInt(document.getElementById('calc-add-qty')?.value)||1;
  var prix=item.cout_unite?Number(item.cout_unite):0;
  calcAddItem(item.nom||'—',prix,qty);
  var qtyEl=document.getElementById('calc-add-qty');
  if(qtyEl)qtyEl.value='1';
  // Reset preview
  document.getElementById('calc-item-preview').style.display='none';
  if(sel)sel.value='';
}


function calcAddItem(nom,prixUnit,qty){
  qty=qty||1;
  var existing=calcCart.find(function(x){return x.nom===nom;});
  if(existing){existing.qty+=qty;existing.prixUnit=prixUnit||existing.prixUnit;}
  else{calcCart.push({nom:nom,prixUnit:prixUnit||0,qty:qty});}
  calcRender();
}

function calcSetQty(idx,v){
  var n=parseInt(v)||0;
  if(n<=0)calcCart.splice(idx,1);
  else calcCart[idx].qty=n;
  calcRender();
}

function calcRemove(idx){
  calcCart.splice(idx,1);
  calcRender();
}

function calcReset(){
  if(calcCart.length&&!confirm('Vider le panier ?'))return;
  calcCart=[];calcRender();
}

function calcOpenIfClosed(){if(!calcOpen)calcToggle();}
function calcQuickAdd(id){
  var item=catalogue.find(function(x){return x.id===id;});
  if(!item)return;
  var prix=item.cout_unite?Number(item.cout_unite):0;
  calcAddItem(item.nom||'—',prix,1);
  calcOpenIfClosed();
}
function calcRender(){
  var el=document.getElementById('calc-cart');
  if(!el)return;
  if(!calcCart.length){
    el.innerHTML='<div class="calc-cart-empty">Panier vide.<br>Ajoutez des équipements ci-dessus.</div>';
    document.getElementById('calc-grand-total').textContent='0 N\u00a3';
    document.getElementById('calc-item-count').textContent='0 type(s) · 0 unité(s)';
    return;
  }
  var totalQty=0,grandTotal=0;
  var html='';
  calcCart.forEach(function(item,i){
    var total=item.prixUnit*item.qty;
    grandTotal+=total;totalQty+=item.qty;
    html+='<div class="calc-cart-item">';
    html+='<div class="cci-name">'+escCalc(item.nom)+'</div>';
    html+='<div class="cci-prix-unit">'+(item.prixUnit?item.prixUnit.toLocaleString('fr')+' N\u00a3 / unité':'Prix non renseigné')+'</div>';
    html+='<div class="cci-row">';
    html+='<input type="number" class="cci-qty" value="'+item.qty+'" min="0" oninput="calcSetQty('+i+',this.value)" title="Quantité">';
    html+='<span class="cci-total">'+(item.prixUnit?total.toLocaleString('fr')+' N\u00a3':'—')+'</span>';
    html+='<button class="cci-del" onclick="calcRemove('+i+')" title="Retirer">✕</button>';
    html+='</div></div>';
  });
  el.innerHTML=html;
  document.getElementById('calc-grand-total').textContent=grandTotal.toLocaleString('fr')+' N\u00a3';
  document.getElementById('calc-item-count').textContent=calcCart.length+' type(s) · '+totalQty+' unité(s)';
}

function escCalc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);margin-top:3px;" id="calc-preview-prix">&mdash;</div>
    </div>
    <input type="number" class="calc-field" id="calc-add-qty" placeholder="Quantit&eacute;" min="1" value="1" style="margin-bottom:6px;text-align:center;font-size:14px;">
    <button class="calc-add-btn" onclick="calcAddFromSelect()">+ Ajouter au panier</button>
  </div>

  <div class="calc-cart" id="calc-cart">
    <div class="calc-cart-empty">Panier vide.<br>S&eacute;lectionnez un &eacute;quipement ci-dessus.</div>
  </div>

  <div class="calc-footer">
    <div class="calc-total-row">
      <span class="calc-total-lbl">Total panier</span>
      <span class="calc-total-val" id="calc-grand-total">0 N&#163;</span>
    </div>
    <div class="calc-total-count" id="calc-item-count">0 type(s) &middot; 0 unit&eacute;(s)</div>
    <button class="calc-reset-btn" onclick="calcReset()">&#8635; Vider le panier</button>
  </div>

</div>
</body>
</html>
